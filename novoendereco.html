<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Novo Endereço</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fonte mais elegante -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    .title-font {
      font-family: 'Playfair Display', serif;
      letter-spacing: 1px;
    }
  </style>
</head>

<body class="bg-white h-screen flex flex-col">

       <!-- NAVBAR -->
    <header>
        <nav class="bg-[#771D1D] px-4 py-2.5">
            <div class="flex justify-between items-center max-w-screen-xl mx-auto">
                <div class="flex items-center">
                    <img src="./src/css/img/Captura de tela 2026-03-30 121633.png" class="h-8 mr-3 rounded-full" />
                    <span class="text-white text-xl font-semibold">
                        Artesano Pizza & Burger
                    </span>
                </div>
                <a href="https://www.google.com/maps?q=Rua+Exemplo+123+Matinhos+PR" target="_blank" class="flex items-center gap-2 text-sm text-white font-medium hover:text-red-600"> 📍 Rua Exemplo, 123 - Matinhos/PR </a>
            </div>
        </nav>
    </header>
  <!-- Título -->
  <div class="text-center py-5 border-b">
    <h1 class="title-font text-xl text-gray-700">
      NOVO ENDEREÇO
    </h1>
  </div>

  <!-- Conteúdo -->
  <div class="flex-1 overflow-y-auto">

    <!-- MAPA -->
    <div class="w-full h-52">
      <iframe 
        class="w-full h-full"
        src="https://maps.google.com/maps?q=San%20Francisco&t=&z=13&ie=UTF8&iwloc=&output=embed">
      </iframe>
    </div>

    <!-- FORM -->
    <div class="p-4 space-y-3">

      <!-- Logradouro -->
      <div>
        <label class="text-[11px] text-gray-500 tracking-wide">
          LOGRADOURO
        </label>
        <input type="text"
          placeholder="Ex: Av. Beira Mar"
          class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:ring-1 focus:ring-red-500 focus:outline-none">
      </div>

      <!-- Número + Complemento -->
      <div class="flex gap-2">
        <div class="w-1/3">
          <label class="text-[11px] text-gray-500">NÚMERO</label>
          <input type="text"
            placeholder="Ex: 184"
            class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:ring-1 focus:ring-red-500 focus:outline-none">
        </div>

        <div class="flex-1">
          <label class="text-[11px] text-gray-500">COMPLEMENTO</label>
          <input type="text"
            placeholder="Ex: Bloco B"
            class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:ring-1 focus:ring-red-500 focus:outline-none">
        </div>
      </div>

      <!-- Referência -->
      <div>
        <label class="text-[11px] text-gray-500">
          PONTO DE REFERÊNCIA
        </label>
        <input type="text"
          class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:ring-1 focus:ring-red-500 focus:outline-none">
      </div>

      <!-- Favoritar -->
      <div class="pt-2">
        <p class="text-[11px] text-gray-500 mb-2 tracking-wide">
          FAVORITAR ENDEREÇO
        </p>

        <div class="flex gap-2">
          <button type="button"
            class="flex-1 border rounded py-2 text-xs flex flex-col items-center hover:bg-gray-100 transition">
            <span>📍</span>
            ESCOLA
          </button>

          <button type="button"
            class="flex-1 border rounded py-2 text-xs flex flex-col items-center hover:bg-gray-100 transition">
            <span>🏠</span>
            CASA
          </button>

          <button type="button"
            class="flex-1 border rounded py-2 text-xs flex flex-col items-center hover:bg-gray-100 transition">
            <span>🎓</span>
            FACULDADE
          </button>
        </div>
      </div>

      <!-- Botões -->
      <div class="pt-4 space-y-2 pb-6">
        <button
          class="w-full bg-green-600 text-white py-2 rounded text-sm font-medium hover:bg-green-700 transition">
          SALVAR
        </button>

        <button
          type="button"
          class="w-full bg-red-500 text-white py-2 rounded text-xs hover:bg-red-600 transition">
          EXCLUIR
        </button>
      </div>

    </div>

  </div>
  <footer class="fixed bottom-0 left-0 w-full bg-[#771D1D] py-3">
                <div class="flex justify-around items-center text-white text-2xl">
            
                    <a href="carrinho.html" class="flex flex-col items-center hover:text-gray-300 transition">
                        <i class="fa-solid fa-cart-shopping"></i>
                    </a>
                    
                    <a href="favoritos.html" class="flex flex-col items-center hover:text-gray-300 transition">
                        <i class="fa-regular fa-heart"></i>
                    </a>
                    
                    <a href="index.html" class="flex flex-col items-center hover:text-gray-300 transition">
                        <i class="fa-solid fa-house"></i>
                    </a>
                    
                    <a href="perfil.html" class="flex flex-col items-center hover:text-gray-300 transition">
                        <i class="fa-regular fa-user"></i>
                    </a>
                    
                    <a href="buscar.html" class="flex flex-col items-center hover:text-gray-300 transition">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </a>
            
                </div>
            </footer>


</body>
</html>
