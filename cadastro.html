<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#8B1E1E] min-h-screen flex items-center justify-center relative">

  <div class="relative bg-gray-200 w-80 p-6 shadow-lg">
    
<h1 class="text-red-700 text-3xl  font-serif">
  CADASTRAR-SE
</h1>

    <form class="space-y-4">
      
      <div>
        <label class="text-xs text-gray-600">E-mail</label>
        <input type="email" class="w-full p-2 bg-gray-300 outline-none">
      </div>

      <div>
        <label class="text-xs text-gray-600">Senha</label>
        <input type="password" class="w-full p-2 bg-gray-300 outline-none">
      </div>

      <div>
        <label class="text-xs text-gray-600">Nome completo</label>
        <input type="text" class="w-full p-2 bg-gray-300 outline-none">
      </div>

      <div class="text-center pt-2">
        <button class="bg-green-700 text-white text-sm px-4 py-1 hover:bg-green-800">
          cadastrar-se
        </button>
      </div>

    </form>
  </div>

</body>
</html>
