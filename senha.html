<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Recuperar Senha</title>
</head>

<body class="h-screen flex items-center justify-center bg-[#8B1E1E] relative overflow-hidden">


  <div class="bg-gray-100 w-80 p-6 shadow-lg z-10 text-center">

    <h1 class="text-red-700 text-xl font-serif mb-4 tracking-widest">
      ESQUECEU SUA SENHA?
    </h1>

    <p class="text-gray-500 text-xs mb-4 leading-relaxed">
      Para redefinir sua senha, digite seu endereço de e-mail ou nome de usuário abaixo.
    </p>

    <input 
      type="text" 
      class="w-full mb-4 p-2 bg-gray-200 rounded-sm outline-none"
    />

    <button class="w-full bg-green-700 text-white py-2 text-sm mb-3 hover:bg-green-800 transition">
      REDEFINIR SENHA
    </button>

    <button class="bg-gray-300 text-gray-700 text-xs px-3 py-1 hover:bg-gray-400 transition">
      Cancelar
    </button>

  </div>

</body>
</html>
