<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>site.food</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Flowbite CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.2.1/flowbite.min.css" rel="stylesheet" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body class="bg-gray-100 pb-32">

    <!-- NAVBAR -->
    <header>
        <nav class="bg-[#771D1D] px-4 py-2.5">
            <div class="flex justify-between items-center max-w-screen-xl mx-auto">
                <div class="flex items-center">
                    <img src="./src/css/img/image 7.png" class="h-8 mr-3 rounded-full" />
                    <span class="text-white text-xl font-semibold">
                        Artesano Pizza & Burger
                    </span>
                </div>
                <a href="https://www.google.com/maps?q=Rua+Exemplo+123+Matinhos+PR" target="_blank"
                    class="flex items-center gap-2 text-sm text-white font-medium hover:text-red-600"> 📍 Rua Exemplo,
                    123 - Matinhos/PR </a>
            </div>
        </nav>
    </header>
    <!-- TÍTULO -->
    <h1 class="text-center text-2xl font-bold mt-6 text-gray-800">
        🛒 Carrinho

    </h1>

    <!-- CONTEÚDO -->
    <div class="max-w-md mx-auto mt-6 space-y-4 px-4">

        <!-- ITEM -->
        <div class="bg-white rounded-xl shadow p-3 flex justify-between items-center">
            <div class="flex gap-3 items-center">
                <img src="./src/css/img/coca.avif" class="w-16 h-16 rounded-lg object-cover">
                <div>
                    <h3 class="font-semibold">COCA</h3>
                    <p class="font-bold text-green-600">R$0,00</p>
                </div>
            </div>

            <div class="flex items-center gap-2">
                <button class="w-6 h-6 bg-gray-200 rounded-full">-</button>
                <span>1</span>
                <button class="w-6 h-6 bg-[#771D1D] text-white rounded-full">+</button>
            </div>
        </div>

        <!-- ITEM -->
        <div class="bg-white rounded-xl shadow p-3 flex justify-between items-center">
            <div class="flex gap-3 items-center">
                <img src="./src/css/img/duascamadas.avif" class="w-16 h-16 rounded-lg object-cover">
                <div>
                    <h3 class="font-semibold">CALABRESA</h3>
                    <p class="text-sm text-gray-500">Molho, mussarela...</p>
                    <p class="font-bold text-green-600">R$0,00</p>
                </div>
            </div>

            <div class="flex items-center gap-2">
                <button class="w-6 h-6 bg-gray-200 rounded-full">-</button>
                <span>1</span>
                <button class="w-6 h-6 bg-[#771D1D] text-white rounded-full">+</button>
            </div>
        </div>

    </div>

    <!-- TOTAL -->
    <div class="fixed bottom-20 left-1/2 transform -translate-x-1/2 w-full max-w-md px-4">

        <div class="bg-white rounded-2xl shadow-lg p-4 space-y-3">

            <!-- Endereço -->
            <div>
                <p class="text-xs text-gray-500">Entregar em</p>
                <p class="font-semibold text-gray-800">Rua Exemplo, 123 - Matinhos/PR</p>
            </div>

            <!-- Taxa -->
            <div class="flex justify-between text-sm text-gray-600">
                <span>Taxa de entrega</span>
                <span>R$5,00</span>
            </div>

            <!-- Total -->
            <div class="flex justify-between items-center border-t pt-2">
                <span class="font-semibold text-gray-700">Total:</span>
                <span class="font-bold text-green-600 text-lg">R$5,00</span>
            </div>

            <!-- Botões -->
            <div class="flex gap-2">
                <button class="w-1/2 border border-red-600 text-red-600 py-2 rounded-xl font-semibold">
                    Cancelar
                </button>

                <button onclick="abrirPopup()" class="w-1/2 bg-[#771D1D] text-white py-2 rounded-xl font-semibold">
                    Fazer pedido
                </button>

                <!-- POPUP -->
                <div id="popupPedido"
                    class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">

                    <div class="bg-white rounded-2xl p-6 w-80 text-center shadow-lg animate-scale">

                        <!-- Ícone -->
                        <div class="flex justify-center mb-4">
                            <div class="bg-green-100 p-4 rounded-full">
                                <i class="fa-solid fa-check text-green-600 text-3xl"></i>
                            </div>
                        </div>

                        <!-- Texto -->
                        <h2 class="text-xl font-semibold mb-2">Pedido realizado!</h2>
                        <p class="text-gray-600 text-sm">Seu pedido foi enviado com sucesso 🎉</p>

                        <!-- Botão -->
                        <button onclick="fecharPopup()"
                            class="mt-5 w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition">
                            OK
                        </button>

                    </div>

                    <script>
                        function abrirPopup() {
                            const popup = document.getElementById("popupPedido");
                            popup.classList.remove("hidden");
                            popup.classList.add("flex");
                        }

                        function fecharPopup() {
                            const popup = document.getElementById("popupPedido");
                            popup.classList.add("hidden");
                            popup.classList.remove("flex");
                        }
                    </script>

                </div>
            </div>

        </div>

    </div>

    <footer class="fixed bottom-0 left-0 w-full bg-[#771D1D] py-3">
        <div class="flex justify-around items-center text-white text-2xl">

            <a href="carrinho.html" class="flex flex-col items-center hover:text-gray-300 transition">
                <i class="fa-solid fa-cart-shopping"></i>
            </a>

            <a href="favoritos.html" class="flex flex-col items-center hover:text-gray-300 transition">
                <i class="fa-regular fa-heart"></i>
            </a>

            <a href="index.html" class="flex flex-col items-center hover:text-gray-300 transition">
                <i class="fa-solid fa-house"></i>
            </a>

            <a href="perfil.html" class="flex flex-col items-center hover:text-gray-300 transition">
                <i class="fa-regular fa-user"></i>
            </a>

            <a onclick="toggleSearch()" class="flex flex-col items-center hover:text-gray-300 transition">
                <i class="fa-solid fa-magnifying-glass"></i>
            </a>

        </div>
    </footer>

</body>
