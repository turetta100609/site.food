<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>site.food</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Flowbite CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.2.1/flowbite.min.css" rel="stylesheet" />
</head>

<body class="bg-gray-100 pb-32">

<!-- NAVBAR -->
<header>
        <nav class="bg-[#771D1D] px-4 py-2.5">
            <div class="flex justify-between items-center max-w-screen-xl mx-auto">
                <div class="flex items-center">
                    <img src="./src/css/img/Captura de tela 2026-03-30 121633.png" class="h-8 mr-3 rounded-full" />
                    <span class="text-white text-xl font-semibold">
                        Artesano Pizza & Burger
                    </span>
                </div>
                <a href="https://www.google.com/maps?q=Rua+Exemplo+123+Matinhos+PR" target="_blank" class="flex items-center gap-2 text-sm text-white font-medium hover:text-red-600"> 📍 Rua Exemplo, 123 - Matinhos/PR </a>
            </div>
        </nav>
    </header>

<!-- TÍTULO -->
<h1 class="text-center text-2xl font-bold mt-6 text-gray-800">
    🛒 Carrinho
</h1>

<!-- CONTEÚDO -->
<div class="max-w-md mx-auto mt-6 space-y-4 px-4">

    <!-- ITEM -->
    <div class="bg-white rounded-xl shadow p-3 flex justify-between items-center">
        <div class="flex gap-3 items-center">
            <img src="./src/css/img/coca.avif" class="w-16 h-16 rounded-lg object-cover">
            <div>
                <h3 class="font-semibold">COCA</h3>
                <p class="font-bold text-green-600">R$0,00</p>
            </div>
        </div>

        <div class="flex items-center gap-2">
            <button class="w-6 h-6 bg-gray-200 rounded-full">-</button>
            <span>1</span>
            <button class="w-6 h-6 bg-[#771D1D] text-white rounded-full">+</button>
        </div>
    </div>

    <!-- ITEM -->
    <div class="bg-white rounded-xl shadow p-3 flex justify-between items-center">
        <div class="flex gap-3 items-center">
            <img src="./src/css/img/duascamadas.avif" class="w-16 h-16 rounded-lg object-cover">
            <div>
                <h3 class="font-semibold">CALABRESA</h3>
                <p class="text-sm text-gray-500">Molho, mussarela...</p>
                <p class="font-bold text-green-600">R$0,00</p>
            </div>
        </div>

        <div class="flex items-center gap-2">
            <button class="w-6 h-6 bg-gray-200 rounded-full">-</button>
            <span>1</span>
            <button class="w-6 h-6 bg-[#771D1D] text-white rounded-full">+</button>
        </div>
    </div>

</div>

<!-- TOTAL -->
<div class="fixed bottom-20 left-1/2 transform -translate-x-1/2 w-full max-w-md px-4">
    
    <div class="bg-white rounded-2xl shadow-lg p-4 space-y-3">
        
        <!-- Endereço -->
        <div>
            <p class="text-xs text-gray-500">Entregar em</p>
            <p class="font-semibold text-gray-800">Rua Exemplo, 123 - Matinhos/PR</p>
        </div>

        <!-- Taxa -->
        <div class="flex justify-between text-sm text-gray-600">
            <span>Taxa de entrega</span>
            <span>R$5,00</span>
        </div>

        <!-- Total -->
        <div class="flex justify-between items-center border-t pt-2">
            <span class="font-semibold text-gray-700">Total:</span>
            <span class="font-bold text-green-600 text-lg">R$5,00</span>
        </div>

        <!-- Botões -->
        <div class="flex gap-2">
            <button class="w-1/2 border border-red-600 text-red-600 py-2 rounded-xl font-semibold">
                Cancelar
            </button>

            <button class="w-1/2 bg-[#771D1D] text-white py-2 rounded-xl font-semibold">
                Finalizar
            </button>
        </div>

    </div>

</div>
<!-- FOOTER -->
<footer class="fixed bottom-0 left-0 w-full bg-[#771D1D] text-white">
  <div class="flex justify-around items-center py-3">

    <!-- Carrinho -->
    <button class="flex flex-col items-center">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2 6h12"/>
      </svg>
    </button>

    <!-- Favoritos -->
    <button class="flex flex-col items-center">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M20.8 4.6a5.5 5.5 0 00-7.8 0L12 5.6l-1-1a5.5 5.5 0 00-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 000-7.8z"/>
      </svg>
    </button>

    <!-- Home -->
    <button class="flex flex-col items-center">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M3 10l9-7 9 7"/>
        <path d="M9 21V9h6v12"/>
      </svg>
    </button>

    <!-- Perfil -->
    <button class="flex flex-col items-center">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M20 21a8 8 0 10-16 0"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </button>

    <!-- Busca -->
    <button class="flex flex-col items-center">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/>
        <path d="M21 21l-4.3-4.3"/>
      </svg>
    </button>

  </div>
</footer>

</body>
