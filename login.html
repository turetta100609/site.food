<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <title>Tela Login</title>
</head>

<body class="h-screen flex items-center justify-center bg-[#8B1E1E] relative overflow-hidden">
  

  <div class="bg-gray-100 w-80 p-6 shadow-lg z-10">
    <h1 class="text-center text-red-700 text-2xl font-serif mb-6 tracking-widest">
      LOGIN
    </h1>
    <input 
      type="email" 
      placeholder="E-mail"
      class="w-full mb-3 p-2 bg-gray-200 rounded-sm outline-none"
    />
    <input 
      type="password" 
      placeholder="Senha"
      class="w-full mb-1 p-2 bg-gray-200 rounded-sm outline-none"
    />
    <div class="text-right text-xs text-gray-500 mb-4 cursor-pointer">
      Esqueceu a senha?
    </div>
    <a href="./index.html" class="block w-full bg-green-700 text-white py-1 rounded-sm mb-4 hover:bg-green-800 transition text-center">Entrar</a>
    <p class="text-center text-xs text-gray-500 mb-3">
      Ou entrar com
    </p>
    <div class="flex justify-center gap-6 mb-4 text-black text-xl">
  
  <a href="https://www.facebook.com" target="_blank">
    <i class="fab fa-facebook-square cursor-pointer hover:text-blue-600"></i>
  </a>

  <a href="https://www.instagram.com" target="_blank">
    <i class="fab fa-instagram-square cursor-pointer hover:text-pink-500"></i>
  </a>

  <a href="https://www.twitter.com" target="_blank">
    <i class="fab fa-twitter-square cursor-pointer hover:text-blue-400"></i>
  </a>

</div>
    <p class="text-center text-xs text-gray-500">
      Não tem uma conta? 
      <a href="./cadastro.html" class="text-red-600 cursor-pointer hover:underline">Cadastre-se.</a>
    </p>
  </div>

</body>
</html>
